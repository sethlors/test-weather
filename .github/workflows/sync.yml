name: Deploy weather dashboard

# Publishes the static dashboard to GitHub Pages on every push to main.
#
# There is no data sync step here anymore: the station pushes each reading
# straight to Supabase (scripts/push_reading.py in the Davis_Weather repo)
# the moment WeatherLink writes it, and the dashboard reads/subscribes to
# Supabase directly from the browser. This workflow only ships the static
# site (index.html + static/) -- it has nothing to do with data freshness.
#
# One-time setup: Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  pages: write
  id-token: write

concurrency:
  group: weather-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          rm -rf _site && mkdir _site
          cp index.html .nojekyll _site/
          cp -r static _site/static

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
