<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather Station</title>
<link rel="icon" type="image/svg+xml" href="static/favicon.svg">
<link rel="stylesheet" href="static/uPlot.min.css">
<link rel="stylesheet" href="static/leaflet.css">
<style>
  /* ---- design tokens (from validated data-viz reference palette) ---- */
  :root {
    color-scheme: light;
    --plane:        #f9f9f7;   /* page background */
    --surface:      #fcfcfb;   /* card / chart surface */
    --surface-2:    #f1f1ee;   /* insets, hover wash */
    --ink:          #0b0b0b;   /* primary text */
    --ink-2:        #52514e;   /* secondary text */
    --muted:        #898781;   /* axis labels, captions */
    --grid:         #e1e0d9;   /* hairline gridlines */
    --axis:         #c3c2b7;   /* baseline / axis */
    --border:       rgba(11,11,11,0.10);
    --border-2:     rgba(11,11,11,0.06);
    --accent:       #2a78d6;   /* series / interactive default */
    --accent-soft:  rgba(42,120,214,0.12);
    --accent2:      #1baf7a;   /* second accent: other-station map pins, distinct from --accent */
    --good:         #0ca30c;
    --bad:          #d03b3b;
    --shadow:       0 1px 2px rgba(11,11,11,0.04), 0 4px 16px rgba(11,11,11,0.05);
    --radius:       14px;
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --plane:        #0d0d0d;
    --surface:      #1a1a19;
    --surface-2:    #232321;
    --ink:          #ffffff;
    --ink-2:        #c3c2b7;
    --muted:        #898781;
    --grid:         #2c2c2a;
    --axis:         #383835;
    --border:       rgba(255,255,255,0.10);
    --border-2:     rgba(255,255,255,0.06);
    --accent:       #3987e5;
    --accent-soft:  rgba(57,135,229,0.16);
    --accent2:      #199e70;
    --good:         #0ca30c;
    --bad:          #e34948;
    --shadow:       0 1px 2px rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      color-scheme: dark;
      --plane:#0d0d0d; --surface:#1a1a19; --surface-2:#232321;
      --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --axis:#383835;
      --border:rgba(255,255,255,0.10); --border-2:rgba(255,255,255,0.06);
      --accent:#3987e5; --accent-soft:rgba(57,135,229,0.16); --accent2:#199e70; --bad:#e34948;
      --shadow:0 1px 2px rgba(0,0,0,0.3), 0 6px 24px rgba(0,0,0,0.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 28px 24px 48px; background: var(--plane); color: var(--ink);
    -webkit-font-smoothing: antialiased; line-height: 1.4;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ---- header ---- */
  header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 22px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    width: 40px; height: 40px; border-radius: 11px; flex: none;
    display: grid; place-items: center;
    background: linear-gradient(150deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #8ab6f5));
    box-shadow: var(--shadow);
  }
  .brand .logo svg { width: 24px; height: 24px; display: block; }
  h1 { font-size: 21px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .spacer { flex: 1; }
  .theme-toggle {
    width: 38px; height: 38px; border-radius: 10px; flex: none; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-2);
    display: grid; place-items: center; transition: background .15s, color .15s;
  }
  .theme-toggle:hover { background: var(--surface-2); color: var(--ink); }
  .theme-toggle svg { width: 18px; height: 18px; }

  /* first-encounter label for the view toggle -- explains the icon in text
     rather than relying on hover-only title discovery; dismissed for good
     after the first click (see initViewHint) */
  .view-hint { font-size: 12.5px; color: var(--muted); white-space: nowrap; align-self: center; }

  /* ---- card ---- */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
  }

  /* ---- controls ---- */
  .controls {
    padding: 14px 16px; margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 14px 18px; align-items: center;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field > .flabel { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  select, input[type=date] {
    font: inherit; font-size: 13.5px; padding: 8px 11px; border-radius: 9px;
    border: 1px solid var(--border); background: var(--surface-2); color: var(--ink);
    cursor: pointer; transition: border-color .15s, box-shadow .15s;
  }
  select { min-width: 210px; }
  select:focus, input[type=date]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .datespan { display: flex; align-items: flex-end; gap: 8px; }
  .datespan .dash { color: var(--muted); padding-bottom: 9px; }

  /* custom range is a manual override of the presets, not a peer control --
     keep it quiet until the user actually reaches for it */
  .field.quiet { margin-left: auto; }
  .field.quiet > .flabel { opacity: .65; }
  .field.quiet input[type=date] {
    background: transparent; border-color: var(--border-2); color: var(--ink-2); font-size: 12.5px;
  }
  .field.quiet:focus-within > .flabel { opacity: 1; }
  .field.quiet:focus-within input[type=date] { background: var(--surface-2); color: var(--ink); }

  /* segmented preset control */
  .segmented { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 2px; }
  .segmented button {
    font: inherit; font-size: 13px; font-weight: 550; padding: 6px 13px; border: 0; border-radius: 7px;
    background: transparent; color: var(--ink-2); cursor: pointer; transition: background .12s, color .12s;
  }
  .segmented button:hover { color: var(--ink); }
  .segmented button.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }
  .segmented button:disabled { color: var(--muted); opacity: .4; cursor: not-allowed; }
  .segmented button:disabled:hover { color: var(--muted); }

  /* ---- KPI row ---- */
  .kpis { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .kpi { padding: 16px 18px; position: relative; overflow: hidden; }
  .kpi .k-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
  .kpi .k-value { font-size: 30px; font-weight: 660; letter-spacing: -0.02em; margin-top: 6px; line-height: 1.05; }
  .kpi .k-value .u { font-size: 15px; font-weight: 550; color: var(--ink-2); margin-left: 3px; }
  .kpi.hero { background:
      radial-gradient(120% 140% at 100% 0%, var(--accent-soft), transparent 60%),
      var(--surface); }
  .kpi.hero .k-value { color: var(--accent); font-size: 34px; }
  .kpi .k-sub { font-size: 12px; color: var(--muted); margin-top: 7px; display: flex; align-items: center; gap: 5px; }
  .delta.up { color: var(--good); } .delta.down { color: var(--bad); }
  .delta svg { width: 12px; height: 12px; vertical-align: -1px; }

  /* ---- chart card ---- */
  .chart-card { padding: 18px 18px 14px; }
  .chart-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .chart-title { font-size: 15px; font-weight: 620; letter-spacing: -0.01em; }
  .chart-title .swatch { display: inline-block; width: 9px; height: 9px; border-radius: 3px; background: var(--accent); margin-right: 7px; vertical-align: 1px; }
  .res-hint { font-size: 12px; color: var(--muted); }
  #chart { width: 100%; min-height: 420px; }
  #chart.loading { opacity: .35; transition: opacity .2s; }
  .empty { display: grid; place-items: center; min-height: 420px; color: var(--muted); font-size: 14px; text-align: center; }

  /* uPlot restyle */
  .uplot, .u-wrap { font-family: inherit !important; }
  .u-legend { font-size: 12.5px; }
  /* custom floating tooltip */
  .u-tooltip {
    position: absolute; pointer-events: none; z-index: 20; padding: 9px 11px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: var(--shadow); font-size: 12.5px; color: var(--ink); white-space: nowrap;
    transform: translate(-50%, -120%); transition: opacity .08s; opacity: 0;
  }
  .u-tooltip .tt-time { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .u-tooltip .tt-row { display: flex; align-items: center; gap: 7px; }
  .u-tooltip .tt-dot { width: 8px; height: 8px; border-radius: 3px; background: var(--accent); flex: none; }
  .u-tooltip .tt-main { font-weight: 640; font-variant-numeric: tabular-nums; }
  .u-tooltip .tt-band { color: var(--muted); font-size: 11px; margin-top: 3px; font-variant-numeric: tabular-nums; }

  .status { font-size: 13px; color: var(--muted); padding: 4px 2px; }

  /* ---- current conditions strip ---- */
  .now { padding: 14px 18px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px 26px; align-items: center; }
  .now .n-head { display: flex; flex-direction: column; gap: 2px; min-width: 130px; }
  .now .n-title { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .now .n-title .pulse, .dash-foot .pulse { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--good); box-shadow: 0 0 0 0 rgba(12,163,12,.5); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(12,163,12,.45); } 70% { box-shadow: 0 0 0 7px rgba(12,163,12,0); } 100% { box-shadow: 0 0 0 0 rgba(12,163,12,0); } }
  .now .n-time { font-size: 12px; color: var(--muted); }
  .now .n-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 10px; margin: -6px -10px; border-radius: 9px; transition: background .12s; }
  .now .n-item:hover { background: var(--surface-2); }
  .now .n-item .ico { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex: none; }
  .now .n-item .ico svg { width: 17px; height: 17px; }
  .now .n-item .n-label { font-size: 11px; color: var(--muted); }
  .now .n-item .n-val { font-size: 15.5px; font-weight: 640; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .now .n-item .n-val .u { font-size: 11.5px; font-weight: 500; color: var(--ink-2); margin-left: 2px; }

  .btn {
    font: inherit; font-size: 12.5px; font-weight: 550; padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface-2); color: var(--ink-2);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: background .12s, color .12s;
  }
  .btn:hover { background: var(--surface); color: var(--ink); }
  .btn svg { width: 13px; height: 13px; }
  .chart-tools { display: flex; align-items: center; gap: 12px; }

  /* ---- station location ---- */
  /* Collapsed (map hidden) by default so the card reads as secondary to the
     chart above it, rather than an equal-weight peer -- .loc-meta (station,
     timezone, sun times) stays visible either way since sun times are the
     legend for the chart's night-shading, not just map trivia. */
  .location { margin-top: 16px; overflow: hidden; display: grid; grid-template-columns: 1fr; border-color: var(--border-2); box-shadow: none; }
  .location.expanded { grid-template-columns: 1fr 260px; }
  .loc-bar { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border-2); }
  .loc-bar-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
  #map[hidden] { display: none; }
  #map { min-height: 300px; background: var(--surface-2); }
  /* Leaflet hardcodes its own font/colors; pull it back onto the page's tokens */
  #map.leaflet-container { font: inherit; background: var(--surface-2); }
  .leaflet-control-attribution {
    background: color-mix(in srgb, var(--surface) 88%, transparent) !important;
    color: var(--muted) !important; font-size: 10.5px !important;
  }
  .leaflet-control-attribution a { color: var(--ink-2) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important; color: var(--ink-2) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface-2) !important; color: var(--ink) !important; }
  /* station pin: pure CSS, so no marker image assets need vendoring */
  .station-pin { position: relative; }
  .station-pin i {
    position: absolute; top: 50%; left: 50%; width: 13px; height: 13px; margin: -6.5px 0 0 -6.5px;
    border-radius: 50%; background: var(--accent); border: 2.5px solid var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .station-pin b {
    position: absolute; top: 50%; left: 50%; width: 13px; height: 13px; margin: -6.5px 0 0 -6.5px;
    border-radius: 50%; background: var(--accent); opacity: .45; animation: ping 2.8s ease-out infinite;
  }
  @keyframes ping { 0% { transform: scale(1); opacity: .45; } 70% { transform: scale(3.6); opacity: 0; } 100% { opacity: 0; } }
  /* other (non-live, NWS) station pin: static dot, no pulse, reads as "not the
     live one" -- clickable, so it gets its own accent (--accent2) rather than
     a muted grey, and a hover/selected state to read as interactive. */
  .other-station-pin { cursor: pointer; }
  .other-station-pin i {
    position: absolute; top: 50%; left: 50%; width: 11px; height: 11px; margin: -5.5px 0 0 -5.5px;
    border-radius: 50%; background: var(--accent2); border: 2px solid var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,.4); transition: transform .12s;
  }
  .other-station-pin:hover i { transform: scale(1.25); }
  .other-station-pin.selected i {
    width: 13px; height: 13px; margin: -6.5px 0 0 -6.5px;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent2) 35%, transparent), 0 1px 4px rgba(0,0,0,.4);
  }
  .other-station-label {
    background: none; border: none; box-shadow: none; font: 600 11px/1 inherit; color: var(--ink-2);
    text-shadow: 0 1px 2px var(--surface), 0 -1px 2px var(--surface), 1px 0 2px var(--surface), -1px 0 2px var(--surface);
    white-space: nowrap; pointer-events: none;
  }
  .other-station-label.selected { color: var(--accent2); }
  .station-pin.clickable { cursor: pointer; }

  .loc-meta { padding: 16px 18px; display: flex; flex-direction: column; gap: 13px; }
  .location.expanded .loc-meta { border-left: 1px solid var(--border); }
  .loc-meta .m-row .m-label { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); }
  .loc-meta .m-row .m-val { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .loc-meta .m-row .m-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .loc-meta .sun { display: flex; gap: 16px; }
  .loc-meta .sun .s-item { display: flex; align-items: center; gap: 7px; }
  .loc-meta .sun svg { width: 15px; height: 15px; color: var(--muted); flex: none; }
  .loc-meta .sun .s-val { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .loc-note { font-size: 11px; color: var(--muted); line-height: 1.45; margin-top: auto; padding-top: 4px; }

  /* ---- dashboard view ---- */
  /* A glanceable, tablet-sized overview of the current reading only. Sizes are
     clamp()ed against the viewport so the same markup reads correctly from a
     7" tablet propped on a desk up to a wall-mounted 13" one across a room. */
  body[data-view="dashboard"] { padding: 18px 18px 26px; }
  body[data-view="dashboard"] .wrap { max-width: 1500px; }

  .dash-top { display: grid; grid-template-columns: minmax(210px, 1fr) 2.5fr; gap: 14px; margin-bottom: 14px; }

  .d-wind { padding: 15px 16px 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .d-cap { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); align-self: flex-start; }
  .d-compass { width: 100%; max-width: 215px; margin-top: 2px; }
  .d-compass svg { width: 100%; height: auto; display: block; }
  .d-wind-read { text-align: center; margin-top: 2px; }
  .d-wind-spd { font-size: clamp(30px, 4.4vw, 44px); font-weight: 670; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  .d-wind-read .d-u { font-size: clamp(13px, 1.5vw, 16px); font-weight: 550; color: var(--ink-2); margin-left: 4px; }
  .d-wind-dir { display: block; font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .d-hero {
    padding: 16px 22px 22px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 4px;
    background: radial-gradient(120% 140% at 100% 0%, var(--accent-soft), transparent 62%), var(--surface);
  }
  .d-baro { font-size: clamp(15px, 2vw, 23px); font-weight: 600; color: var(--ink-2);
            display: flex; align-items: center; justify-content: center; gap: 9px; flex-wrap: wrap; }
  .d-baro .b-trend { display: inline-flex; align-items: center; gap: 5px; }
  .d-baro .b-trend svg { width: 1em; height: 1em; }
  .d-baro .b-sep { color: var(--axis); }
  /* --ink rather than the metric accent: at this size the number is the one
     thing that must read from across a room, and full contrast wins. */
  .d-temp { font-size: clamp(84px, 14.5vw, 178px); font-weight: 680; color: var(--ink);
            letter-spacing: -0.045em; line-height: .95; font-variant-numeric: tabular-nums; }
  .d-dew { font-size: clamp(12.5px, 1.4vw, 15px); color: var(--muted); }

  .dash-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }
  .dash-row.four { grid-template-columns: repeat(4, 1fr); }
  .d-tile { padding: 15px 18px 17px; cursor: pointer; transition: border-color .12s, transform .12s; }
  .d-tile:hover { border-color: color-mix(in srgb, var(--tint, var(--accent)) 45%, var(--border)); }
  .d-tile:active { transform: scale(.995); }
  .d-tile .t-label { font-size: clamp(10.5px, 1.15vw, 12.5px); font-weight: 600; letter-spacing: .05em;
                     text-transform: uppercase; color: var(--muted); }
  .d-tile .t-value { font-size: clamp(30px, 4.8vw, 52px); font-weight: 660; letter-spacing: -0.03em;
                     margin-top: 5px; line-height: 1.02; font-variant-numeric: tabular-nums; color: var(--tint, var(--ink)); }
  .d-tile .t-value .u { font-size: .44em; font-weight: 550; color: var(--ink-2); margin-left: 3px; letter-spacing: 0; }

  .dash-sec { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
              color: var(--muted); margin: 2px 2px 9px; }
  .dash-foot { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); padding: 2px 2px; }

  /* Tablet portrait: the wind card moves above the hero, and turns on its side
     so the compass and the reading sit beside each other — stacked, a
     full-width card leaves a screen's worth of dead space under the dial. */
  @media (max-width: 900px) {
    .dash-top { grid-template-columns: 1fr; }
    .d-wind { position: relative; flex-direction: row; justify-content: center; gap: 30px; padding: 34px 16px 20px; }
    .d-wind .d-cap { position: absolute; top: 15px; left: 16px; }
    .d-compass { max-width: 148px; margin-top: 0; }
    .dash-row.four { grid-template-columns: repeat(2, 1fr); }
    .d-temp { font-size: clamp(76px, 20vw, 150px); }
  }

  /* Below this the three feel tiles stop fitting side by side; pairing them is
     better than letting one orphan onto its own row. */
  @media (max-width: 620px) {
    .dash-row { grid-template-columns: repeat(2, 1fr); }
    .d-wind { flex-direction: column; gap: 10px; padding: 15px 16px 18px; }
    .d-wind .d-cap { position: static; align-self: flex-start; }
    .view-hint { display: none; }
  }

  @media (max-width: 720px) {
    .kpis { grid-template-columns: 1fr 1fr; }
    select { min-width: 0; }
    .controls { gap: 12px; }
    .location.expanded { grid-template-columns: 1fr; }
    .location.expanded .loc-meta { border-left: 0; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 18a5 5 0 1 1 1.4-9.8A6 6 0 0 1 20 10a4 4 0 0 1-.5 8H7z"/>
          <path d="M16 4.5v2M20.5 8h-2M12 3.5v1.5"/>
        </svg>
      </div>
      <div>
        <h1>Weather Station</h1>
        <div class="subtitle" id="subtitle">Loading&hellip;</div>
      </div>
    </div>
    <div class="spacer"></div>
    <span class="view-hint" id="viewHint">Dashboard view, for wall displays &rarr;</span>

/* ---------- solar geometry ---------- */
// NOAA's sunrise equation. Pure arithmetic — no dependency, no network, and it
// only needs a date and a coordinate, which is the whole reason the station's
// position is worth knowing beyond drawing a dot on a map.
//
// Returns UTC *instants* (ms). Mapping those onto the chart's axis is a
// separate, fussier problem — see nightSpans() below.
function sunInstantsUTC(dateMs, lat, lon) {
  const rad = Math.PI / 180;
  const lw = -lon;                                  // formula wants west-positive
  const d = dateMs / 86400000 + 2440587.5 - 2451545.0;   // days since J2000
  const n = Math.round(d - 0.0009 - lw / 360);
  const ds = 0.0009 + lw / 360 + n;                 // mean solar noon
  const M = (357.5291 + 0.98560028 * ds) % 360;     // solar mean anomaly
  const C = 1.9148 * Math.sin(M * rad) + 0.02 * Math.sin(2 * M * rad) + 0.0003 * Math.sin(3 * M * rad);
  const lam = (M + C + 180 + 102.9372) % 360;       // ecliptic longitude
  const transit = 2451545.0 + ds + 0.0053 * Math.sin(M * rad) - 0.0069 * Math.sin(2 * lam * rad);
  const decl = Math.asin(Math.sin(lam * rad) * Math.sin(23.44 * rad));
  // -0.833° accounts for atmospheric refraction plus the sun's apparent radius,
  // so this is the visible disc touching the horizon, not geometric center.
  const cosW = (Math.sin(-0.833 * rad) - Math.sin(lat * rad) * Math.sin(decl))
             / (Math.cos(lat * rad) * Math.cos(decl));
  if (cosW > 1 || cosW < -1) return null;           // polar night / midnight sun
  const w = Math.acos(cosW) / rad;
  const jd2ms = j => (j - 2440587.5) * 86400000;
  return { rise: jd2ms(transit - w / 360), set: jd2ms(transit + w / 360) };
}

// Wall-clock hour/minute of an instant, in the station's timezone.
const TZ_FMT = new Intl.DateTimeFormat("en-US", {
  timeZone: STATION.tz, hour: "2-digit", minute: "2-digit", hour12: false,
});
function localHM(ms) {
  const p = Object.fromEntries(TZ_FMT.formatToParts(ms).map(x => [x.type, x.value]));
  // Intl renders midnight as "24" in some engines' h23/h24 handling
  return { h: Number(p.hour) % 24, m: Number(p.minute) };
}
function fmtHM({ h, m }) {
  const ampm = h < 12 ? "AM" : "PM";
  return `${((h + 11) % 12) + 1}:${String(m).padStart(2, "0")} ${ampm}`;
}

// The chart's x-axis is *not* real UTC: readings are stored as local wall-clock
// time relabeled as UTC (see scripts/weather_ts.py), and uPlot renders the axis
// in Etc/UTC so displayed times match what the station recorded. Sun times must
// land in that same frame, so we compute the true instant, read its wall clock
// in the station's zone, then re-stamp that wall clock as UTC. Going straight
// from the UTC instant would put the bands 5-6 hours off — and DST would make
// the error shift twice a year.
function sunWallClock(dayStartWall) {
  // dayStartWall is midnight of a local day, expressed in the wall-clock frame.
  const d = new Date(dayStartWall * 1000);
  const approx = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), 12) ;
  const s = sunInstantsUTC(approx, STATION.lat, STATION.lon);
  if (!s) return null;
  const mk = ms => {
    const { h, m } = localHM(ms);
    return Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate(), h, m) / 1000;
  };
  return { rise: mk(s.rise), set: mk(s.set) };
}

// Dark intervals overlapping [t0, t1], in the chart's wall-clock-as-UTC frame.
function nightSpans(t0, t1) {
  const spans = [];
  const DAY = 86400;
  let day = Math.floor(t0 / DAY) * DAY - DAY;   // start a day early: the night
  for (; day <= t1 + DAY; day += DAY) {         // before t0 can reach into range
    const s = sunWallClock(day);
    if (!s) continue;
    const next = sunWallClock(day + DAY);
    // night runs from this day's sunset to the next day's sunrise
    if (next) spans.push([s.set, next.rise]);
  }
  return spans.filter(([a, b]) => b > t0 && a < t1);
}

    if (error) throw error;
    return { t: data.map(r => r.t), avg: data.map(r => r.mx), min: null, max: null, bars: true };
  }
  if (resolution === "raw") {
    const { data, error } = await sb.rpc("readings_raw", { metric, start_ts: startSec, end_ts: endSec });
    if (error) throw error;
    return { t: data.map(r => r.t), avg: data.map(r => r.v), min: null, max: null };
  }

  const { data, error } = await sb.rpc("readings_bucketed", { metric, start_ts: startSec, end_ts: endSec, span_sec: span });
  if (error) throw error;

/* ---------- other Iowa stations (NWS observations) ---------- */
// A real instant -> the wall-clock it displays as in STATION.tz, expressed
// as if that wall-clock were UTC -- the same convention every timestamp in
// this app already uses (see the note above fmtDate). NWS timestamps are
// genuine UTC, so this is what makes their points land on the right spot on
// an x-axis built around wall-clock-as-UTC.
function realInstantToWallEpoch(date) {
  const parts = Object.fromEntries(
    new Intl.DateTimeFormat("en-CA", {
      timeZone: STATION.tz, hour12: false,
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    }).formatToParts(date).map(x => [x.type, x.value])
  );
  const hour = parts.hour === "24" ? 0 : +parts.hour;   // some locales say "24" for midnight
  return Date.UTC(+parts.year, +parts.month - 1, +parts.day, hour, +parts.minute, +parts.second) / 1000;
}
function nowWallEpoch() { return realInstantToWallEpoch(new Date()); }

// Inverse of the above: a wall-clock-as-UTC epoch -> the real instant that
// produces it in STATION.tz. One correction pass handles DST correctly
// outside the ~1hr transition window itself, which is precise enough for
// picking a query range.
function wallEpochToRealInstant(epochSec) {
  const guess = epochSec * 1000;
  const drift = realInstantToWallEpoch(new Date(guess)) - epochSec;
  return new Date(guess - drift * 1000);
}

// NWS caps each response at 500 observations and hands back a

// runs out (or a range this app never requests would be exceeded).
async function fetchNwsObservations(stationId, startSec, endSec) {
  const start = wallEpochToRealInstant(startSec).toISOString();
  const end = wallEpochToRealInstant(endSec).toISOString();
  let url = `https://api.weather.gov/stations/${stationId}/observations?start=${start}&end=${end}&limit=500`;
  const features = [];
  for (let page = 0; url && page < 20; page++) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("NWS request failed: HTTP " + res.status);
    const geo = await res.json();
    features.push(...geo.features);
    url = geo.pagination && geo.pagination.next;
  }
  return features
    .map(f => ({ t: realInstantToWallEpoch(new Date(f.properties.timestamp)), p: f.properties }))
    .sort((a, b) => a.t - b.t);
}

async function getNwsSeries(stationId, metric, startSec, endSec, resolution) {
  const spec = NWS_METRICS[metric];
  if (!spec) return { t: [], avg: [], min: null, max: null };
  const obs = await fetchNwsObservations(stationId, startSec, endSec);
  const pts = obs
    .map(o => ({ t: o.t, v: spec.conv(o.p[spec.prop] && o.p[spec.prop].value) }))
    .filter(p => p.v != null && p.t >= startSec && p.t <= endSec);
  if (resolution === "raw") {
    return { t: pts.map(p => p.t), avg: pts.map(p => p.v), min: null, max: null };
  }
  const span = resolution === "hourly" ? 3600 : 86400;
  const buckets = new Map();
  for (const p of pts) {
    const b = Math.floor(p.t / span) * span;
    if (!buckets.has(b)) buckets.set(b, []);
    buckets.get(b).push(p.v);
  }
  const bs = [...buckets.keys()].sort((a, b) => a - b);
  return {
    t: bs,
    avg: bs.map(b => { const vs = buckets.get(b); return vs.reduce((s, v) => s + v, 0) / vs.length; }),
    min: bs.map(b => Math.min(...buckets.get(b))),
    max: bs.map(b => Math.max(...buckets.get(b))),
  };
}

/* ---------- tooltip plugin ---------- */
// Shades the hours between sunset and sunrise behind the series, which makes
// the diurnal cycle legible at a glance — the daily temperature swing lines up
// with the bands instead of being an unexplained wave.
//
// Only worth drawing on short ranges: past ~2 weeks the bands compress into a
// grey smear that hides the data instead of explaining it, so we bail out and
// let the chart render clean.
const NIGHT_MAX_SPAN = 16 * 86400;
function nightPlugin() {
  return {
    hooks: {
      drawClear: u => {
        // the visible window, which is what matters after a drag-zoom
        const t0 = u.scales.x.min, t1 = u.scales.x.max;
        if (t0 == null || t1 == null || t1 - t0 > NIGHT_MAX_SPAN) return;
        const ctx = u.ctx;
        const { left, top, width, height } = u.bbox;
        ctx.save();
        ctx.beginPath();
        ctx.rect(left, top, width, height);
        ctx.clip();
        ctx.fillStyle = isDark() ? "rgba(255,255,255,0.045)" : "rgba(11,11,11,0.045)";
        for (const [a, b] of nightSpans(t0, t1)) {
          const xa = u.valToPos(Math.max(a, t0), "x", true);
          const xb = u.valToPos(Math.min(b, t1), "x", true);
          if (xb > xa) ctx.fillRect(xa, top, xb - xa, height);
        }
        ctx.restore();
      },
    },
  };
}

function tooltipPlugin(unit, hasBand, accent, dateOnly) {
  let tip, over;
  function fmt(v) { return v == null ? "–" : (Math.round(v * 100) / 100).toLocaleString(); }
  return {
    hooks: {
      init: u => {
        over = u.over;
        tip = document.createElement("div");
        tip.className = "u-tooltip";
        over.appendChild(tip);
        over.addEventListener("mouseleave", () => tip.style.opacity = 0);
      },
      setCursor: u => {
        const { idx, left, top } = u.cursor;
        if (idx == null || left < 0) { tip.style.opacity = 0; return; }
        const t = u.data[0][idx];
        const v = u.data[1][idx];
        if (v == null) { tip.style.opacity = 0; return; }
        const d = new Date(t * 1000);
        const time = dateOnly
          ? d.toLocaleDateString("en-US", { timeZone: "UTC", weekday: "short", month: "short", day: "numeric" })
          : d.toLocaleString("en-US", { timeZone: "UTC", month: "short", day: "numeric",
              hour: "numeric", minute: "2-digit" });
        let html = `<div class="tt-time">${time}</div>`
          + `<div class="tt-row"><span class="tt-dot" style="background:${accent}"></span><span class="tt-main">${fmt(v)} ${unit}</span></div>`;
        if (hasBand && u.data[2] && u.data[3]) {
          html += `<div class="tt-band">min ${fmt(u.data[2][idx])} · max ${fmt(u.data[3][idx])} ${unit}</div>`;
        }
        tip.innerHTML = html;
        tip.style.left = left + "px";
        tip.style.top = top + "px";
        tip.style.opacity = 1;
      },
    },
  };
}

// Custom bar renderer: rounded-top bars from the zero baseline, drawn in a
// draw hook (this uPlot build has no paths.bars). 2px surface gap between bars.
function barsPlugin(accent) {
  return {
    hooks: {
      draw: u => {
        const ctx = u.ctx;
        const ts = u.data[0], vs = u.data[1];
        if (!ts.length) return;
        const y0 = u.valToPos(0, "y", true);
        // bar width from the smallest x step, minus a 2px gap each side
        let step = Infinity;
        for (let i = 1; i < ts.length; i++) step = Math.min(step, u.valToPos(ts[i], "x", true) - u.valToPos(ts[i - 1], "x", true));
        if (!isFinite(step)) step = u.bbox.width / 2;
        const w = Math.max(3, step - 4);
        const r = Math.min(4, w / 2);
        ctx.save();
        ctx.beginPath();
        ctx.rect(u.bbox.left, u.bbox.top, u.bbox.width, u.bbox.height);
        ctx.clip();
        ctx.fillStyle = accent;
        for (let i = 0; i < ts.length; i++) {
          if (vs[i] == null) continue;
          const x = u.valToPos(ts[i], "x", true) - w / 2;
          const yv = u.valToPos(vs[i], "y", true);
          const h = y0 - yv;
          if (h <= 0) continue;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(x, yv, w, h, [r, r, 0, 0]);
          else ctx.rect(x, yv, w, h);
          ctx.fill();
        }
        ctx.restore();
      },
    },
  };
}

function drawChart(data, meta, hasBand) {
  const el = document.getElementById("chart");
  el.classList.remove("loading");
  el.innerHTML = "";
  if (!data.t.length) {
    el.innerHTML = '<div class="empty">No readings in this range.<br>Try a wider range or a different metric.</div>';
    return;
  }

  const accent = meta.accent[isDark() ? 1 : 0];
  const fg = cssVar("--muted") || "#898781";
  const grid = cssVar("--grid") || "#e1e0d9";
  const axis = cssVar("--axis") || "#c3c2b7";

  // gradient fill under the line
  function fillGrad(u) {
    const ctx = u.ctx;
    const g = ctx.createLinearGradient(0, u.bbox.top, 0, u.bbox.top + u.bbox.height);
    g.addColorStop(0, hexA(accent, 0.28));
    g.addColorStop(1, hexA(accent, 0.02));
    return g;
  }

  const bars = !!data.bars;
  const series = [
    {},
    bars
      ? { label: `${meta.label} (${meta.unit})`, stroke: "transparent", width: 0, points: { show: false } }
      : {
          label: `${meta.label} (${meta.unit})`,
          stroke: accent, width: 2, fill: hasBand ? undefined : fillGrad,
          points: { show: data.t.length < 220, size: 5, stroke: accent, fill: cssVar("--surface") },
        },
  ];
  const arr = [data.t, data.avg];
  if (hasBand && data.min && data.max) {
    series.push({ label: "min", stroke: "transparent", width: 0, points: { show: false } });
    series.push({ label: "max", stroke: "transparent", width: 0, points: { show: false },
      fill: hexA(accent, 0.14), band: { series: [2, 3] } });
    arr.push(data.min, data.max);
  }

  const opts = {
    width: el.clientWidth || 800,
    height: 420,
    padding: [12, 8, 4, 4],
    // db timestamps are wall-clock-as-UTC; render the x-axis in UTC so the
    // displayed times match what the weather station recorded, for any viewer.
    tzDate: ts => uPlot.tzDate(new Date(ts * 1e3), "Etc/UTC"),
    series,
    legend: { show: false },
    axes: [
      { stroke: fg, size: 44, grid: { stroke: grid, width: 1 }, ticks: { stroke: axis, width: 1, size: 5 },
        font: "12px system-ui, sans-serif" },
      { stroke: fg, size: 52, grid: { stroke: grid, width: 1 }, ticks: { stroke: axis, width: 1, size: 5 },
        font: "12px system-ui, sans-serif",
        // enough decimals that adjacent ticks never collapse to the same label
        values: (u, splits) => {
          const incr = splits.length > 1 ? Math.abs(splits[1] - splits[0]) : 1;
          const dec = Math.max(0, Math.min(4, Math.ceil(-Math.log10(incr)) + (Number.isInteger(incr * 100) ? 0 : 1)));
          return splits.map(v => v.toFixed(dec));
        } },
    ],
    scales: { x: { time: true }, y: bars ? { range: (u, mn, mx) => [0, Math.max(mx, 0.01) * 1.1] } : {} },
    cursor: {
      drag: { x: true, y: false },
      points: { size: 8, width: 2, stroke: accent, fill: bars ? accent : cssVar("--surface") },
      x: true, y: false,
    },
    // night shading goes first so it paints behind the series; it's skipped for
    // daily-total bars, where a day is one bar and "night" has no meaning
    plugins: bars ? [barsPlugin(accent), tooltipPlugin(meta.unit, false, accent, true)]
                  : [nightPlugin(), tooltipPlugin(meta.unit, hasBand, accent)],
  };
  chart = new uPlot(opts, arr, el);
}

// hex "#rrggbb" + alpha -> rgba()
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;
}

function fmtNum(v) {
  if (v == null || Number.isNaN(v)) return "–";
  const r = Math.round(v * 100) / 100;
  return r.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

const ARROW_UP = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>';
const ARROW_DN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M18 13l-6 6-6-6"/></svg>';

function tile(label, value, unit, extraCls, sub) {
  return `<div class="card kpi ${extraCls || ''}">
    <div class="k-label">${label}</div>
    <div class="k-value">${value}<span class="u">${value === '–' ? '' : unit}</span></div>
    ${sub ? `<div class="k-sub">${sub}</div>` : ''}
  </div>`;
}

function renderStats(data, unit, accent, res, dailyTotal) {
  // the series is bucketed, so name the comparison window honestly
  const heroLabel = dailyTotal ? "Latest Day Total"
    : res === "raw" ? "Latest Reading"
    : res === "hourly" ? "Latest Hour (avg)"
    : "Latest Day (avg)";
  const vsLabel = dailyTotal ? "vs prior day"
    : res === "raw" ? "vs prior reading"
    : res === "hourly" ? "vs prior hour"
    : "vs prior day";
  const vals = data.avg.filter(v => v != null);
  const el = document.getElementById("stats");
  el.style.setProperty("--accent", accent);
  el.style.setProperty("--accent-soft", hexA(accent, 0.14));
  if (!vals.length) {
    el.innerHTML = tile(heroLabel, "–", unit, "hero") + tile("Min", "–", unit) + tile("Avg", "–", unit) + tile("Max", "–", unit);
    return;
  }
  const min = Math.min(...vals), max = Math.max(...vals);
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  const last = vals[vals.length - 1];
  const prev = vals.length > 1 ? vals[vals.length - 2] : null;

  let sub = "";
  if (prev != null) {
    const d = last - prev;
    if (Math.abs(d) < 0.005) {
      sub = `<span>No change ${vsLabel}</span>`;
    } else {
      const dir = d > 0 ? "up" : "down";
      const icon = d > 0 ? ARROW_UP : ARROW_DN;
      sub = `<span class="delta ${dir}">${icon}${fmtNum(Math.abs(d))} ${unit}</span><span>${vsLabel}</span>`;
    }
  }

  el.innerHTML =
    tile(heroLabel, fmtNum(last), unit, "hero", sub) +
    tile("Minimum", fmtNum(min), unit) +
    tile("Average", fmtNum(avg), unit) +
    tile("Maximum", fmtNum(max), unit);
}

/* ---------- current conditions strip ---------- */
// Kept up to date by main()'s initial fetch and the realtime subscription
// below -- reading it is synchronous so every existing call site (renderNow,
// renderDashboard) needs no await.
function latestReading() {
  return state.latest;
}

function renderNow() {
  const r = latestReading();
  if (!r) return;
  const el = document.getElementById("nowPanel");
  const when = new Date(r.ts * 1000).toLocaleString("en-US", { timeZone: "UTC",
    month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  const dark = isDark() ? 1 : 0;
  const items = ["outsideTemp", "outsideHumidity", "windSpeed", "barometer", "rainRate", "dailyRain", "outsideDewPt"]
    .filter(k => r[k] != null)
    .map(k => {
      const m = METRICS[k];
      const c = m.accent[dark];
      return `<div class="n-item" data-metric="${k}" title="Show ${m.label} history" role="button" tabindex="0">
        <span class="ico" style="color:${c};background:${hexA(c, 0.14)}">${NOW_ICONS[k] || ""}</span>
        <span><span class="n-label">${m.label.replace("Outside ", "")}</span><br>
        <span class="n-val">${fmtNum(r[k])}<span class="u">${m.unit}</span></span></span>
      </div>`;
    }).join("");
  el.innerHTML = `<div class="n-head">
      <span class="n-title"><span class="pulse"></span>Current conditions</span>
      <span class="n-time">as of ${when}</span>
    </div>` + items;
  el.hidden = false;
  el.querySelectorAll(".n-item").forEach(item => {
    const go = () => { document.getElementById("metric").value = item.dataset.metric; loadSeries(); };
    item.onclick = go;
    item.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } };
  });
}

/* ---------- dashboard view ---------- */
// A single-screen, glanceable read of the newest sample — the tablet-on-the-wall
// counterpart to the history view. It deliberately queries only the latest row:
// everything here is "right now", so there is no range, no bucketing, no chart.

const DIR_DEG = {
  N: 0, NNE: 22.5, NE: 45, ENE: 67.5, E: 90, ESE: 112.5, SE: 135, SSE: 157.5,
  S: 180, SSW: 202.5, SW: 225, WSW: 247.5, W: 270, WNW: 292.5, NW: 315, NNW: 337.5,
};

const STEADY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg>';
const GRID_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/></svg>';
const CHART_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M8 15l3.5-4.5 3 3L20 7"/></svg>';

// Compass rose. The needle points at the direction the wind blows *from*, which
// is the meteorological convention the station reports in — so a needle on SW
// means a southwesterly, not wind heading southwest.
function compassSvg(dir, color) {
  const bearing = dir && dir in DIR_DEG ? DIR_DEG[dir] : null;
  const pt = (r, deg) => {
    const a = (deg - 90) * Math.PI / 180;
    return [(100 + r * Math.cos(a)).toFixed(1), (100 + r * Math.sin(a)).toFixed(1)];
  };
  let marks = "";
  for (let i = 0; i < 16; i++) {
    const major = i % 4 === 0;
    // both tick classes hang off the outer ring so they read as graduations on
    // it rather than as dashes floating in the bezel
    const [x1, y1] = pt(91, i * 22.5);
    const [x2, y2] = pt(major ? 79 : 85, i * 22.5);
    marks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" `
      + `stroke="${major ? "var(--ink-2)" : "var(--axis)"}" stroke-width="${major ? 2.5 : 1.5}" stroke-linecap="round"/>`;
  }
  ["N", "NE", "E", "SE", "S", "SW", "W", "NW"].forEach((L, i) => {
    const [x, y] = pt(63, i * 45);
    const cardinal = L.length === 1;
    marks += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" `
      + `font-family="system-ui, sans-serif" font-size="${cardinal ? 16 : 12.5}" font-weight="${cardinal ? 700 : 600}" `
      + `fill="${L === "N" ? "var(--ink)" : "var(--muted)"}">${L}</text>`;
  });
  const needle = bearing == null ? ""
    : `<g transform="rotate(${bearing} 100 100)"><path d="M100 31 L106.5 100 L100 117 L93.5 100 Z" fill="${color}"/></g>`;
  const label = dir ? `Wind from the ${dir}` : "Wind direction unavailable";
  return `<svg viewBox="0 0 200 200" role="img" aria-label="${label}">`
    + `<circle cx="100" cy="100" r="95" fill="var(--surface-2)" stroke="var(--border)" stroke-width="1"/>`
    + `<circle cx="100" cy="100" r="76" fill="none" stroke="var(--grid)" stroke-width="1"/>`
    + marks + needle
    + `<circle cx="100" cy="100" r="7" fill="${bearing == null ? "var(--axis)" : "var(--ink)"}"/></svg>`;
}

// The station reports trend as a phrase ("Falling Slowly"); we only need its
// direction for the arrow and pass the phrase itself through verbatim.
function baroTrendIcon(phrase) {
  if (!phrase) return null;
  const p = phrase.toLowerCase();
  if (p.startsWith("rising")) return ARROW_UP;
  if (p.startsWith("falling")) return ARROW_DN;
  return STEADY_ICON;
}

// `dec` pins the decimal count where a fixed width reads better than a
// significant-figures one — rain totals sitting at 0.00 rather than 0.
function dashTile(key, label, r, dec) {
  const m = METRICS[key];
  const c = m.accent[isDark() ? 1 : 0];
  const v = r[key];
  const shown = (v == null || Number.isNaN(v)) ? "–" : (dec == null ? fmtNum(v) : v.toFixed(dec));
  return `<div class="card d-tile" data-metric="${key}" style="--tint:${c}" role="button" tabindex="0" title="Show ${m.label} history">
    <div class="t-label">${label}</div>
    <div class="t-value">${shown}<span class="u">${shown === "–" ? "" : m.unit}</span></div>
  </div>`;
}

function renderDashboard() {
  const r = latestReading();
  if (!r) return;
  const dark = isDark() ? 1 : 0;

  // wind: compass + speed
  document.getElementById("compass").innerHTML =
    compassSvg(r.windDirection, METRICS.windSpeed.accent[dark]);
  document.getElementById("dWindSpd").textContent =
    r.windSpeed == null ? "–" : r.windSpeed.toFixed(1);
  document.getElementById("dWindDir").textContent = r.windDirection
    ? `from the ${r.windDirection}`
    : "direction not recorded";

  // barometer strip + hero temperature
  const icon = baroTrendIcon(r.barTrend);
  // three decimals: pressure moves in thousandths of an inch, and rounding to
  // fmtNum's two would flatten most of the change the trend phrase describes
  const baro = r.barometer == null ? "–" : r.barometer.toFixed(3);
  document.getElementById("dBaro").innerHTML =
    `<span>Barometer <b style="color:var(--ink);font-weight:670">${baro}</b> inHg</span>`
    + (icon ? `<span class="b-sep">·</span><span class="b-trend">${icon}${r.barTrend}</span>` : "");
  document.getElementById("dTemp").textContent = `${fmtNum(r.outsideTemp)}°`;
  document.getElementById("dDew").textContent =
    r.outsideDewPt == null ? "" : `Dew point ${fmtNum(r.outsideDewPt)} °F`;

  document.getElementById("dashFeel").innerHTML =
    dashTile("windChill", "Wind Chill", r) +
    dashTile("outsideHumidity", "Humidity", r, 0) +
    dashTile("outsideHeatIndex", "Heat Index", r);

  document.getElementById("dashRain").innerHTML =
    dashTile("rainRate", "Rate", r, 2) +
    dashTile("stormRain", "This Storm", r, 2) +
    dashTile("monthlyRain", "This Month", r, 2) +
    dashTile("totalRain", "This Year", r, 2);

  const when = new Date(r.ts * 1000).toLocaleString("en-US", { timeZone: "UTC",
    weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  document.getElementById("dashFoot").innerHTML =
    `<span class="pulse"></span><span>Updated ${when} · station time</span>`;

  document.querySelectorAll("#dashView .d-tile").forEach(t => {
    const go = () => {
      document.getElementById("metric").value = t.dataset.metric;
      setView("history");
      loadSeries();
    };
    t.onclick = go;
    t.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); } };
  });
}

/* ---------- view switching ---------- */
const VIEW_KEY = "wx-view";
function currentView() { return document.body.getAttribute("data-view") || "history"; }

function setView(v) {
  const dash = v === "dashboard";
  document.body.setAttribute("data-view", dash ? "dashboard" : "history");
  document.getElementById("dashView").hidden = !dash;
  document.getElementById("mainView").hidden = dash;

  const btn = document.getElementById("viewToggle");
  btn.innerHTML = dash ? CHART_ICON : GRID_ICON;
  btn.title = dash ? "History view" : "Dashboard view";
  btn.setAttribute("aria-label", dash ? "Switch to history view" : "Switch to dashboard view");
  btn.setAttribute("aria-pressed", String(dash));
  // a wall tablet gets power-cycled; remember which view it was left on
  try { localStorage.setItem(VIEW_KEY, dash ? "dashboard" : "history"); } catch (e) {}

  if (dash) {
    if (state.db) renderDashboard();
    startDashRefresh();
  } else {
    stopDashRefresh();
    // both were laid out inside a hidden container (client width 0) and only
    // learn their real size once it's back on screen
    if (chart) chart.setSize({ width: document.getElementById("chart").clientWidth, height: 420 });
    if (map) map.invalidateSize();
  }
}

// The history view is loaded once and driven by hand; the dashboard is meant
// to be left running for days. New readings arrive over the realtime
// subscription (see subscribeLive() below) within moments of the station
// posting them, so this timer is just a reconciliation fallback in case a
// websocket drops without the browser noticing.
const DASH_REFRESH_MS = 5 * 60 * 1000;
let dashTimer = null;
function startDashRefresh() {
  stopDashRefresh();
  dashTimer = setInterval(refreshDashboardData, DASH_REFRESH_MS);
}
function stopDashRefresh() {
  if (dashTimer) { clearInterval(dashTimer); dashTimer = null; }
}
async function refreshDashboardData() {
  if (document.hidden) return;   // don't refetch behind a locked or backgrounded screen
  try {
    const [{ lo, hi }, latest] = await Promise.all([fetchBounds(), fetchLatest()]);
    state.dbStart = lo; state.dbEnd = hi;
    if (latest) state.latest = latest;
    renderDashboard();
  } catch (err) {
    console.error("dashboard refresh failed", err);
  }
}

// Primary live-update path: Postgres broadcasts each INSERT on `readings`
// (see "alter publication supabase_realtime add table readings" in
// supabase/schema.sql) and this pushes it straight into the UI -- no polling.
function subscribeLive() {
  sb.channel("readings-live")
    .on("postgres_changes", { event: "INSERT", schema: "public", table: "readings" }, payload => {
      state.latest = payload.new;
      state.dbEnd = payload.new.ts;
      if (currentView() === "dashboard") renderDashboard();
    })
    .subscribe();
}

function initViewToggle() {
  const btn = document.getElementById("viewToggle");
  document.body.setAttribute("data-view", "history");
  btn.innerHTML = GRID_ICON;
  btn.onclick = () => setView(currentView() === "dashboard" ? "history" : "dashboard");
  initViewHint();
}

// Explains the toggle in text once, at first encounter, rather than leaving
// discovery to a hover-only title attribute. Dismissed for good on first
// click of the toggle -- by then the user has found it and doesn't need it
// re-explained on every visit.
const VIEW_HINT_KEY = "wx-view-hint-dismissed";
function initViewHint() {
  const hint = document.getElementById("viewHint");
  let dismissed = false;
  try { dismissed = !!localStorage.getItem(VIEW_HINT_KEY); } catch (e) {}
  if (dismissed) { hint.hidden = true; return; }
  document.getElementById("viewToggle").addEventListener("click", () => {
    hint.hidden = true;
    try { localStorage.setItem(VIEW_HINT_KEY, "1"); } catch (e) {}
  }, { once: true });
}

/* ---------- CSV export of the charted series ---------- */
function exportCsv() {
  const d = state.lastData, meta = state.lastMeta;
  if (!d || !meta) return;
  const hasBand = !!(d.min && d.max);
  const head = ["timestamp_utc", meta.key + (hasBand ? "_avg" : "")].concat(hasBand ? [meta.key + "_min", meta.key + "_max"] : []);
  const lines = [head.join(",")];
  for (let i = 0; i < d.t.length; i++) {
    const row = [new Date(d.t[i] * 1000).toISOString(), d.avg[i]];
    if (hasBand) row.push(d.min[i], d.max[i]);
    lines.push(row.join(","));
  }
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const stationSuffix = isHomeStation() ? "" : `_${state.station}`;
  a.download = `${meta.key}${stationSuffix}_${document.getElementById("start").value}_${document.getElementById("end").value}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadSeries() {
  const metric = document.getElementById("metric").value;
  const startV = document.getElementById("start").value;
  const endV = document.getElementById("end").value;
  if (!metric || !startV || !endV) return;
  const startSec = fromDateInput(startV, false);
  const endSec = fromDateInput(endV, true);
  const res = pickResolution(startSec, endSec);
  const meta = METRICS[metric];

  // accent for chart title swatch
  const accent = meta.accent[isDark() ? 1 : 0];
  const stationName = isHomeStation() ? null : IA_STATIONS.find(s => s.id === state.station)?.name;
  document.getElementById("chartTitle").innerHTML =
    `<span class="swatch" style="background:${accent}"></span>${meta.label} <span style="color:var(--muted);font-weight:500">(${meta.unit})</span>` +
    (stationName ? ` <span style="color:var(--muted);font-weight:500">&middot; ${stationName}, IA</span>` : "");

  document.getElementById("resHint").textContent = (
    meta.dailyTotal ? "One bar per day = that day's rain total" :
    res === "raw" ? "Full 5-minute resolution" :
    res === "hourly" ? "Hourly averages · band = min/max per hour" :
    "Daily averages · band = min/max per day") + " · drag to zoom, double-click to reset" +
    (stationName ? ` · NWS observations, last ${NWS_HISTORY_DAYS} days only` : "");
  document.getElementById("chart").classList.add("loading");
  const data = await getSeries(metric, startSec, endSec, res);
  state.lastData = data;
  state.lastMeta = { ...meta, key: metric };
  document.getElementById("csvBtn").hidden = !data.t.length;
  drawChart(data, meta, res !== "raw" && !meta.dailyTotal);
  renderStats(data, meta.unit, accent, res, !!meta.dailyTotal);

  // shareable URL state
  const active = document.querySelector(".segmented button.active");
  const frag = `#m=${metric}&s=${startV}&e=${endV}` + (active ? `&p=${active.dataset.days}` : "");
  history.replaceState(null, "", frag);
}

// restore state from a shared URL; returns true if applied
function applyHashState() {
  if (!location.hash) return false;
  const p = new URLSearchParams(location.hash.slice(1));
  const m = p.get("m"), s = p.get("s"), e = p.get("e"), preset = p.get("p");
  if (!m || !METRICS[m]) return false;
  document.getElementById("metric").value = m;
  if (preset && document.querySelector(`.segmented button[data-days="${preset}"]`)) {
    applyPreset(preset === "all" ? "all" : Number(preset));
    return true;
  }
  if (s && e) {
    document.getElementById("start").value = s;
    document.getElementById("end").value = e;
    loadSeries();
    return true;
  }
  return false;
}

// Home station's bounds come from Supabase (state.dbStart/dbEnd, loaded once
// and kept current by the realtime subscription). Other stations only have
// NWS_HISTORY_DAYS of scrollback, ending "now" -- computed fresh each call
// since, unlike the home station, nothing pushes updates for it.
function currentBounds() {
  if (isHomeStation()) return { lo: state.dbStart, hi: state.dbEnd };
  const hi = nowWallEpoch();
  return { lo: hi - NWS_HISTORY_DAYS * 86400, hi };
}

function setPresetActive(days) {
  document.querySelectorAll(".segmented button").forEach(b => b.classList.toggle("active", b.dataset.days === String(days)));
}
// Presets longer than the other stations' retention window are disabled
// (not hidden, so the layout doesn't jump when switching stations back and
// forth) rather than clamped -- picking "30D" for an external station would
// silently mean something different from picking it for the home station.
function updatePresetAvailability() {
  const home = isHomeStation();
  document.querySelectorAll(".segmented button").forEach(b => {
    const days = b.dataset.days;
    const tooLong = !home && days !== "all" && Number(days) > NWS_HISTORY_DAYS;
    b.disabled = tooLong || (!home && days === "all");
    b.title = b.disabled ? `Only the last ${NWS_HISTORY_DAYS} days are available for other stations` : "";
  });
}
function applyPreset(days) {
  const bounds = currentBounds();
  const end = new Date(bounds.hi * 1000);
  let start = days === "all" ? new Date(bounds.lo * 1000)
                             : new Date(end.getTime() - days * 86400000);
  if (start.getTime() / 1000 < bounds.lo) start = new Date(bounds.lo * 1000);
  document.getElementById("start").value = fmtDate(start);
  document.getElementById("end").value = fmtDate(end);
  setPresetActive(days);
  loadSeries();
}
function buildPresets() {
  const el = document.getElementById("presets");
  [["1D", 1], ["7D", 7], ["30D", 30], ["90D", 90], ["1Y", 365], ["All", "all"]].forEach(([label, days]) => {
    const b = document.createElement("button");
    b.textContent = label; b.dataset.days = String(days);
    b.onclick = () => { if (!b.disabled) applyPreset(days); };
    el.appendChild(b);
  });
}

function clearPresetsOnManual() {
  setPresetActive("__none__");
  loadSeries();
}

/* ---------- locator map ---------- */
// Vector tiles are cut from the Protomaps planet build into a single local
// .pmtiles file (see scripts/fetch_iowa_basemap.sh) and read with range
// requests, so the map itself makes no third-party requests (unlike the
// weather data, which now lives in Supabase). Vector also means light/dark
// is a genuine restyle rather than a CSS filter over baked-in raster colors.
//
// This is the state-wide basemap: the map doubles as the station picker, so
// every entry in IA_STATIONS needs to be visible and clickable at once, not
// just the home station's immediate surroundings. (An earlier version used a
// tighter, street-level basemap -- static/basemap/station.pmtiles, still in
// the repo -- but that only has room for ~3 of the 19 curated stations
// inside its bounds, so it can't serve as a selector for the rest.)
const IOWA_MAP = {
  file: "static/basemap/iowa.pmtiles",
  bounds: [[40.3, -96.7], [43.7, -90.0]],
  minZoom: 6, maxZoom: 10,
};

let map = null, mapLayer = null;
const stationMarkers = {};   // id -> { pin, label } -- "" is the home station
let homePin = null;

function initMap() {
  const el = document.getElementById("map");
  map = L.map(el, {
    center: [STATION.lat, STATION.lon],
    zoom: 7,
    // clamped to what the tileset actually contains: pan or zoom past this
    // and the map would show blank tiles rather than "more map"
    minZoom: IOWA_MAP.minZoom,
    maxZoom: IOWA_MAP.maxZoom,
    maxBounds: L.latLngBounds(IOWA_MAP.bounds),
    maxBoundsViscosity: 1,
    scrollWheelZoom: false,   // the page scrolls; don't hijack the wheel
    attributionControl: true,
  });
  drawMapLayer();

  homePin = L.marker([STATION.lat, STATION.lon], {
    icon: L.divIcon({ className: "station-pin clickable", html: "<b></b><i></i>", iconSize: [13, 13] }),
    keyboard: false,
  }).addTo(map);
  homePin.on("click", () => selectStationOnMap(null));
  stationMarkers[""] = { pin: homePin, label: null };

  IA_STATIONS.forEach(st => {
    const pin = L.marker([st.lat, st.lon], {
      icon: L.divIcon({ className: "other-station-pin", html: "<i></i>", iconSize: [11, 11] }),
      keyboard: false,
    }).addTo(map);
    const label = L.marker([st.lat, st.lon], {
      icon: L.divIcon({ className: "other-station-label", html: st.name, iconSize: [0, 0], iconAnchor: [-9, 4] }),
      keyboard: false, interactive: false,
    }).addTo(map);
    pin.on("click", () => selectStationOnMap(st.id));
    stationMarkers[st.id] = { pin, label };
  });
  highlightStationOnMap(null);
  fitMapToStations();

  // ODbL requires visible attribution for this Produced Work of OSM data
  map.attributionControl.setPrefix("").addAttribution(
    '<a href="https://openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap</a>'
  );
}

// Clicking a pin drives the same station-change path as the dropdown, so the
// map and the <select> can never disagree about which station is active.
function selectStationOnMap(stationId) {
  document.getElementById("station").value = stationId || "";
  onStationChange();
}

// Called from onStationChange() so a dropdown pick highlights on the map too.
function highlightStationOnMap(stationId) {
  const active = stationId || "";
  Object.entries(stationMarkers).forEach(([id, m]) => {
    const on = id === active;
    m.pin.getElement()?.classList.toggle("selected", on);
    m.label?.getElement()?.classList.toggle("selected", on);
  });
}

// frame the home station + every picker option together; called at init and
// again on first expand, since the map was sized 0x0 (hidden) at init time
function fitMapToStations() {
  const pts = [[STATION.lat, STATION.lon], ...IA_STATIONS.map(s => [s.lat, s.lon])];
  map.fitBounds(L.latLngBounds(pts), { padding: [24, 24] });
}

// The map card is collapsed by default (see .location CSS) so it doesn't
// read as chart-tier; .loc-meta (station/tz/sun) stays visible either way.
// #map is initialized hidden, so Leaflet sizes it at 0x0 -- invalidateSize()
// plus a re-fit on first reveal corrects that.
const MAP_EXPANDED_KEY = "wx-map-expanded";
function setMapExpanded(expanded) {
  const card = document.getElementById("locationCard");
  const btn = document.getElementById("mapToggle");
  card.classList.toggle("expanded", expanded);
  document.getElementById("map").hidden = !expanded;
  btn.setAttribute("aria-expanded", String(expanded));
  btn.textContent = expanded ? "Hide map" : "Show map";
  try { localStorage.setItem(MAP_EXPANDED_KEY, expanded ? "1" : "0"); } catch (e) {}
  if (expanded && map) {
    map.invalidateSize();
    fitMapToStations();
  }
}
function initMapToggle() {
  let expanded = false;
  try { expanded = localStorage.getItem(MAP_EXPANDED_KEY) === "1"; } catch (e) {}
  document.getElementById("mapToggle").onclick = () =>
    setMapExpanded(!document.getElementById("locationCard").classList.contains("expanded"));
  setMapExpanded(expanded);
}

// Landuse kinds worth tinting green; everything else in that layer is left as
// plain land so the map stays a locator rather than a full-detail street map.
const GREEN_LANDUSE = new Set([
  "park", "forest", "wood", "grass", "meadow", "golf_course", "nature_reserve",
  "recreation_ground", "cemetery", "national_park", "protected_area", "garden",
  "pitch", "dog_park", "scrub", "farmland",
]);

// protomaps-leaflet 5.x dropped its bundled themes: it speaks the v4 tile
// schema (bare `kind` attributes) but expects the caller to supply paint rules.
// That's fine — hand-rolling them is only a few lines and lets the basemap use
// the dashboard's own design tokens, so the map reads as part of the page
// instead of an embedded widget with its own palette.
//
// (Worth knowing if you ever upgrade: protomaps-leaflet 4.x has built-in themes
// but only understands the older `pmap:`-prefixed v2 schema, so pairing it with
// this v4 tileset silently renders a near-empty map. Version and tile schema
// have to move together.)
function mapPalette() {
  const d = isDark();
  return {
    land:   cssVar("--surface-2"),
    green:  d ? "#1b221a" : "#e3eadd",
    water:  d ? "#16232f" : "#c6d8e8",
    minor:  d ? "#2f2f2d" : "#ffffff",
    major:  d ? "#3d3d39" : "#ffffff",
    hiway:  d ? "#4f4b42" : "#f4d7a4",
    bound:  d ? "#3a3a37" : "#d5d4cc",
    label:  cssVar("--ink-2"),
    halo:   d ? "#121212" : "#ffffff",
  };
}

function drawMapLayer() {
  if (mapLayer) map.removeLayer(mapLayer);
  const p = mapPalette();
  const P = protomapsL;
  const road = kind => (z, f) => f.props.kind === kind;

  mapLayer = P.leafletLayer({
    url: IOWA_MAP.file,
    attribution: "",
    backgroundColor: p.land,
    paintRules: [
      { dataLayer: "earth",    symbolizer: new P.PolygonSymbolizer({ fill: p.land }) },
      { dataLayer: "landuse",  symbolizer: new P.PolygonSymbolizer({ fill: p.green }),
        filter: (z, f) => GREEN_LANDUSE.has(f.props.kind) },
      { dataLayer: "water",    symbolizer: new P.PolygonSymbolizer({ fill: p.water }) },
      { dataLayer: "boundaries", symbolizer: new P.LineSymbolizer({ color: p.bound, width: 1, dash: [3, 2] }) },
      // drawn thin→thick so bigger roads sit on top at every zoom
      { dataLayer: "roads", symbolizer: new P.LineSymbolizer({ color: p.minor, width: P.exp(1.6, [[10, 0.4], [12, 1.4]]) }),
        filter: road("minor_road") },
      { dataLayer: "roads", symbolizer: new P.LineSymbolizer({ color: p.major, width: P.exp(1.6, [[10, 0.8], [12, 2.4]]) }),
        filter: road("major_road") },
      { dataLayer: "roads", symbolizer: new P.LineSymbolizer({ color: p.hiway, width: P.exp(1.6, [[10, 1.4], [12, 3.6]]) }),
        filter: road("highway") },
    ],
    labelRules: [
      { dataLayer: "places",
        symbolizer: new P.CenteredTextSymbolizer({
          labelProps: ["name"], fill: p.label, stroke: p.halo, width: 2.5,
          font: "600 11px system-ui, sans-serif",
        }),
        filter: (z, f) => f.props.kind === "locality" },
    ],
  });
  mapLayer.addTo(map);
}

function renderLocation() {
  document.getElementById("locName").textContent = STATION.label;
  // shown at the same precision we actually store, so the page doesn't imply
  // a fix it doesn't have
  document.getElementById("locCoords").textContent =
    `${Math.abs(STATION.lat).toFixed(2)}° ${STATION.lat >= 0 ? "N" : "S"}, ` +
    `${Math.abs(STATION.lon).toFixed(2)}° ${STATION.lon >= 0 ? "E" : "W"} · ±1 km`;
  document.getElementById("locTz").textContent = STATION.tz.replace("_", " ");

  // today per the station's clock, which is also the frame the chart uses
  const nowWall = (() => {
    const p = Object.fromEntries(new Intl.DateTimeFormat("en-CA", {
      timeZone: STATION.tz, year: "numeric", month: "2-digit", day: "2-digit",
    }).formatToParts(Date.now()).map(x => [x.type, x.value]));
    return Date.UTC(+p.year, +p.month - 1, +p.day) / 1000;
  })();
  const s = sunWallClock(nowWall);
  document.getElementById("sunLabel").textContent = "Sunrise / Sunset today";
  document.getElementById("sunrise").textContent = s ? fmtHM(localHM_fromWall(s.rise)) : "–";
  document.getElementById("sunset").textContent  = s ? fmtHM(localHM_fromWall(s.set))  : "–";
  document.getElementById("locNote").textContent =
    "Shaded bands on the chart mark the hours between sunset and sunrise, computed from these coordinates.";
}

// sunWallClock returns seconds already in wall-clock-as-UTC, so read the clock
// straight off it rather than re-converting through a timezone
function localHM_fromWall(sec) {
  const d = new Date(sec * 1000);
  return { h: d.getUTCHours(), m: d.getUTCMinutes() };
}

function populateStationPicker() {
  const sel = document.getElementById("station");
  const home = document.createElement("option");
  home.value = ""; home.textContent = `${STATION.label} (live)`;
  sel.appendChild(home);
  const grp = document.createElement("optgroup");
  grp.label = `Other Iowa stations (last ${NWS_HISTORY_DAYS} days, NWS)`;
  IA_STATIONS.forEach(s => {
    const o = document.createElement("option");
    o.value = s.id; o.textContent = s.name;
    grp.appendChild(o);
  });
  sel.appendChild(grp);
  sel.onchange = onStationChange;
}

// Rain metrics have no NWS equivalent, so they're only offered for the home
// station. Rebuilding on every station switch keeps the current selection
// when it's still valid, and falls back to outsideTemp when it isn't.
function buildMetricOptions() {
  const sel = document.getElementById("metric");
  const prev = sel.value;
  sel.innerHTML = "";
  const home = isHomeStation();
  METRIC_GROUPS.forEach(({ label, keys }) => {
    const available = keys.filter(k => home || NWS_METRICS[k]);
    if (!available.length) return; // e.g. "Rainfall" on a non-home station
    const grp = document.createElement("optgroup");
    grp.label = label;
    available.forEach(k => {
      const m = METRICS[k];
      const o = document.createElement("option");
      o.value = k; o.textContent = `${m.label} (${m.unit})`;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
  sel.value = [...sel.options].some(o => o.value === prev) ? prev : sel.options[0].value;
}

function onStationChange() {
  state.station = document.getElementById("station").value || null;
  buildMetricOptions();
  updatePresetAvailability();
  highlightStationOnMap(state.station);
  applyPreset(7);
}

async function main() {
  initTheme();
  initViewToggle();
  // independent of the database, so a failed db load still leaves a working map
  initMap();
  initMapToggle();
  renderLocation();
  try {
    const [{ lo, hi }, latest] = await Promise.all([fetchBounds(), fetchLatest()]);
    state.dbStart = lo; state.dbEnd = hi;
    state.latest = latest;
    state.db = true;   // ready flag; data now lives in Supabase, not a fetched file
    subscribeLive();
    const s = new Date(lo * 1000), e = new Date(hi * 1000);
    const nice = d => d.toLocaleDateString("en-US", { timeZone: "UTC", year: "numeric", month: "short", day: "numeric" });
    document.getElementById("subtitle").innerHTML =
      `Live conditions &amp; history since ${nice(s)}`;

    populateStationPicker();
    buildMetricOptions();
    document.getElementById("metric").onchange = loadSeries;
    document.getElementById("start").onchange = clearPresetsOnManual;
    document.getElementById("end").onchange = clearPresetsOnManual;
    document.getElementById("csvBtn").onclick = exportCsv;
    buildPresets();
    updatePresetAvailability();
    renderNow();
    if (!applyHashState()) applyPreset(7);
    // restore last view *after* the chart exists, so switching back to history
    // finds something already drawn rather than an empty card
    let savedView = null;
    try { savedView = localStorage.getItem(VIEW_KEY); } catch (e) {}
    if (savedView === "dashboard") setView("dashboard");
    window.addEventListener("resize", () => {
      if (chart && currentView() === "history") {
        chart.setSize({ width: document.getElementById("chart").clientWidth, height: 420 });
      }
    });
  } catch (err) {
    document.getElementById("subtitle").textContent = "Failed to load database.";
    document.getElementById("status").textContent = String(err);
    console.error(err);
  }
}
main();
</script>
</body>
</html>
